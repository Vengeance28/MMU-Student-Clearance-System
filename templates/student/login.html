{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login — MMU Clearance System</title>
  <link rel="stylesheet" href="{% static 'css/mmu.css' %}">
  <style>
    body { background: linear-gradient(160deg, #1B2A6B 0%, #0d1a4a 60%, #1a0a2e 100%); }
    .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .login-box { background:#fff; border-radius:16px; padding:44px 40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    .login-logo { text-align:center; margin-bottom:24px; }
    .login-logo img { height:75px; }
    .login-title { text-align:center; font-size:1.35rem; font-weight:800; color:var(--mmu-navy); margin-bottom:4px; }
    .login-subtitle { text-align:center; color:#aaa; font-size:0.82rem; margin-bottom:28px; }
    .input-wrap { position:relative; margin-bottom:16px; }
    .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:1rem; pointer-events:none; }
    .input-wrap input { padding-left:42px; height:48px; border-radius:8px; font-size:0.9rem; width:100%; border:1px solid var(--mmu-border); color:var(--mmu-body); transition:border-color 0.15s,box-shadow 0.15s; box-sizing:border-box; }
    .input-wrap input:focus { outline:none; border-color:var(--mmu-navy); box-shadow:0 0 0 3px rgba(27,42,107,0.1); }
    .forgot-row { text-align:right; margin:-4px 0 16px; }
    .forgot-row a { font-size:0.82rem; color:var(--mmu-navy); text-decoration:none; }
    .forgot-row a:hover { color:var(--mmu-red); text-decoration:underline; }
    .btn-login { width:100%; height:48px; background:var(--mmu-red); color:#fff; border:none; border-radius:8px; font-size:0.95rem; font-weight:700; cursor:pointer; transition:background 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-login:hover { background:#aa0000; }
    .staff-row { text-align:center; margin-top:20px; font-size:0.82rem; color:#aaa; }
    .staff-row a { color:var(--mmu-navy); font-weight:600; text-decoration:none; }
    .staff-row a:hover { color:var(--mmu-red); }
    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; z-index:999; opacity:0; pointer-events:none; transition:opacity 0.2s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal-box { background:#fff; border-radius:14px; padding:32px; max-width:400px; width:95%; box-shadow:0 8px 40px rgba(0,0,0,0.25); }
    .modal-title { font-size:1.05rem; font-weight:800; color:var(--mmu-navy); margin-bottom:6px; }
    .modal-sub { color:#888; font-size:0.83rem; line-height:1.6; margin-bottom:20px; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo"><img src="{% static 'images/mmu_logo.png' %}" alt="MMU Logo"></div>
    <div class="login-title">Student Portal</div>
    <div class="login-subtitle">MMU Student Clearance System</div>

    <div id="errorAlert" class="alert alert-error" style="display:none;margin-bottom:16px"></div>
    <div id="successAlert" class="alert alert-success" style="display:none;margin-bottom:16px"></div>

    <div class="input-wrap">
      <span class="input-icon">🎓</span>
      <input id="regNumber" type="text" placeholder="Registration Number (e.g. CIT-222-044/2020)" autocomplete="username">
    </div>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password">
    </div>
    <div class="forgot-row"><a href="#" onclick="openForgot();return false">Forgot password?</a></div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="staff-row">Are you staff? <a href="/staff/login/">Staff Login →</a></div>
  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="forgotModal">
  <div class="modal-box">
    <div class="modal-title">🔑 Reset Password</div>
    <div class="modal-sub">Enter your email address and we'll send you a password reset link.</div>
    <div id="forgotError" class="alert alert-error" style="display:none;margin-bottom:14px"></div>
    <div id="forgotSuccess" class="alert alert-success" style="display:none;margin-bottom:14px"></div>
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:0.85rem;font-weight:600;color:var(--mmu-navy);margin-bottom:6px">Email Address</label>
      <input id="forgotEmail" type="email" placeholder="your.email@gmail.com" style="width:100%;height:44px;padding:0 14px;border:1px solid var(--mmu-border);border-radius:8px;font-size:0.9rem;box-sizing:border-box">
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="closeForgot()" style="flex:1;height:42px;background:transparent;border:2px solid var(--mmu-navy);color:var(--mmu-navy);border-radius:8px;font-weight:600;cursor:pointer">Cancel</button>
      <button id="forgotBtn" onclick="doForgot()" style="flex:1;height:42px;background:var(--mmu-red);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer">Send Reset Link</button>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('mmu_token')) {
    const u = JSON.parse(localStorage.getItem('mmu_user') || '{}');
    if (u.reg_number) window.location.href = '/dashboard/';
  }
  document.getElementById('password').addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('forgotEmail').addEventListener('keypress', e => { if(e.key==='Enter') doForgot(); });

  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const reg = document.getElementById('regNumber').value.trim();
    const pw  = document.getElementById('password').value;
    document.getElementById('errorAlert').style.display = 'none';
    if (!reg || !pw) { showErr('Please enter your registration number and password.'); return; }
    btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px"></span> Signing in…';
    try {
      const res = await fetch('/api/auth/student/login/', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({reg_number:reg,password:pw}) });
      const data = await res.json();
      if (res.ok) { localStorage.setItem('mmu_token',data.token); localStorage.setItem('mmu_user',JSON.stringify(data)); window.location.href='/dashboard/'; }
      else showErr(data.error || 'Invalid credentials. Please try again.');
    } catch(e) { showErr('Network error. Please try again.'); }
    btn.disabled=false; btn.innerHTML='Sign In';
  }

  function showErr(msg) { const el=document.getElementById('errorAlert'); el.textContent=msg; el.style.display='block'; }
  function openForgot() { document.getElementById('forgotModal').classList.add('open'); document.getElementById('forgotEmail').focus(); }
  function closeForgot() {
    document.getElementById('forgotModal').classList.remove('open');
    ['forgotError','forgotSuccess'].forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById('forgotEmail').value='';
  }

  async function doForgot() {
    const btn = document.getElementById('forgotBtn');
    const email = document.getElementById('forgotEmail').value.trim();
    ['forgotError','forgotSuccess'].forEach(id=>document.getElementById(id).style.display='none');
    if (!email) { document.getElementById('forgotError').textContent='Please enter your email address.'; document.getElementById('forgotError').style.display='block'; return; }
    btn.disabled=true; btn.textContent='Sending…';
    try {
      const res = await fetch('/api/auth/student/forgot-password/', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:email}) });
      const data = await res.json();
      if (res.ok) { document.getElementById('forgotSuccess').textContent=data.message; document.getElementById('forgotSuccess').style.display='block'; }
      else { document.getElementById('forgotError').textContent=data.error||'Could not process request.'; document.getElementById('forgotError').style.display='block'; }
    } catch(e) { document.getElementById('forgotError').textContent='Network error.'; document.getElementById('forgotError').style.display='block'; }
    btn.disabled=false; btn.textContent='Send Reset Link';
  }
  document.getElementById('forgotModal').addEventListener('click', function(e){ if(e.target===this) closeForgot(); });
</script>
</body>
</html>
