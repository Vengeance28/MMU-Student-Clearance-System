{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — MMU Clearance System</title>
  <link rel="stylesheet" href="{% static 'css/mmu.css' %}">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <img src="{% static 'images/mmu_logo.png' %}" alt="MMU Logo">
    </div>
    <div class="login-title">Staff Portal</div>
    <div class="login-subtitle">MMU Student Clearance System</div>

    <div id="errorAlert" class="alert alert-error" style="display:none"></div>

    <div class="form-group">
      <label class="form-label">Staff Number</label>
      <input id="staffNumber" class="form-control" type="text"
             placeholder="e.g. LIB-001" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="password" class="form-control" type="password"
             placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button id="loginBtn" class="btn btn-primary" style="width:100%" onclick="doLogin()">
      Sign In
    </button>
    <div style="text-align:center;margin-top:18px;font-size:0.82rem;color:#777">
      Are you a student? <a href="/login/" style="color:var(--mmu-navy);font-weight:600">Student Login →</a>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in as staff
  const existing = JSON.parse(localStorage.getItem('mmu_user') || 'null');
  if (localStorage.getItem('mmu_token') && existing && existing.staff_number) {
    window.location.href = '/staff/dashboard/';
  }

  document.getElementById('password').addEventListener('keypress', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorAlert');
    const sn  = document.getElementById('staffNumber').value.trim();
    const pw  = document.getElementById('password').value;

    err.style.display = 'none';
    if (!sn || !pw) { showError('Please enter your staff number and password.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    try {
      const res = await fetch('/api/auth/staff/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ staff_number: sn, password: pw })
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('mmu_token', data.token);
        localStorage.setItem('mmu_user', JSON.stringify(data));
        window.location.href = '/staff/dashboard/';
      } else {
        showError(data.error || 'Login failed. Please check your credentials.');
      }
    } catch (e) {
      showError('Network error. Please try again.');
    }

    btn.disabled = false;
    btn.innerHTML = 'Sign In';
  }

  function showError(msg) {
    const el = document.getElementById('errorAlert');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
